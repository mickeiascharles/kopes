<div class="story-container">
  <img
    *ngIf="imagemAnteriorUrl"
    [src]="imagemAnteriorUrl"
    class="bg-imagem imagem-anterior"
    alt=""
    aria-hidden="true"
  />

  <img
    *ngIf="slides[slideAtual].imagemUrl"
    [src]="slides[slideAtual].imagemUrl"
    class="bg-imagem imagem-atual"
    [class.imagem-pronta]="imagemPronta"
    alt="Story"
    loading="eager"
    decoding="async"
    fetchpriority="high"
    (load)="imagemCarregada()"
    (error)="imagemErro()"
  />

  <div class="story-loader" *ngIf="!imagemPronta"></div>

  <div class="overlay-inferior"></div>

  <div class="area-voltar" (click)="voltarSlide($event)"></div>
  <div class="area-avancar" (click)="proximoSlide()"></div>

  <div class="conteudo-inferior">
    <div class="progress-bar-container">
      <div class="progress-bar" *ngFor="let s of slides; let i = index; trackBy: trackByIndex">
        <div
          class="progress-fill"
          [class.active]="i === slideAtual"
          [class.passed]="i < slideAtual"
        ></div>
      </div>
    </div>

    <h1 class="texto-slide" *ngIf="slides[slideAtual].texto">
      {{ slides[slideAtual].texto }}
    </h1>
  </div>
</div>
