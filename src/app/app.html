<div class="desktop-layout">
  <div class="desktop-decoracao" aria-hidden="true">
    <div class="desktop-rabisco desktop-rabisco-1"></div>
    <div class="desktop-rabisco desktop-rabisco-2"></div>
    <div class="desktop-xadrez"></div>
    <div class="desktop-desenho desktop-desenho-angelo"></div>
    <div class="desktop-desenho desktop-desenho-mickeias"></div>

    <div class="desktop-nomes">
      <span class="desktop-nome-angelo">Angelo</span>
      <span class="desktop-mais">+</span>
      <span class="desktop-nome-mickeias">Mickeias</span>
    </div>
  </div>

  <main class="mobile-container">
    <div class="tela-conteudo">
      <app-tela-inicial *ngIf="telaAtual === 0" (completou)="avancarTela()"> </app-tela-inicial>

      <app-estacao-radio *ngIf="telaAtual === 1" (completou)="avancarTela()"> </app-estacao-radio>

      <app-tempo-conexao *ngIf="telaAtual === 2" (completou)="avancarTela()">
      </app-tempo-conexao>

      <app-mini-quest *ngIf="telaAtual === 3" (completou)="avancarTela()"> </app-mini-quest>

      <app-stories *ngIf="telaAtual === 4" (completou)="avancarTela()"> </app-stories>

      <app-mapa-jornada *ngIf="telaAtual === 5" (completouMapa)="avancarTela()">
      </app-mapa-jornada>

      <app-tela-final *ngIf="telaAtual === 6" (reiniciar)="voltarInicio()">
      </app-tela-final>
    </div>
  </main>
</div>
