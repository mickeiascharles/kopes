<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Kopes</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f1eb" />
    <link rel="icon" type="image/png" href="icone.png" />
    <link rel="preload" href="spotify_mix.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
    <link rel="preload" href="desenho_laranja.png" as="image" />
    <link rel="preload" href="desenho_preto.png" as="image" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f2f1eb;
        overflow: hidden;
      }

      app-root {
        display: block;
        width: 100vw;
        height: var(--app-height, 100vh);
        min-height: var(--app-height, 100vh);
        background: #f2f1eb;
      }

      .app-shell-loader {
        position: fixed;
        inset: 0;
        background: #f2f1eb;
      }
    </style>
    <script>
      (function () {
        var ajustarAltura = function () {
          var viewport = window.visualViewport;
          var altura = viewport && viewport.height ? viewport.height : window.innerHeight;
          document.documentElement.style.setProperty('--app-height', altura + 'px');
        };

        ajustarAltura();
        window.addEventListener('resize', ajustarAltura, { passive: true });
        window.addEventListener('orientationchange', ajustarAltura, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', ajustarAltura, { passive: true });
        }
      })();
    </script>
  </head>
  <body>
    <app-root><div class="app-shell-loader"></div></app-root>
  </body>
</html>
